name: Expo Android Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment (stg, prd)'
        required: true
        type: string
      node-version:
        required: true
        type: string
      yarn-version:
        required: false
        type: string
        default: '4.9.2'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # The full SDK 56 release build (multi-ABI native libs + lint-vital AARs)
      # exhausts the ubuntu runner's ~14 GB disk — `bundleReleaseLocalLintAar`
      # fails with "Could not add file ... to ZIP" once free space hits ~0.
      # Reclaim space from pre-installed toolchains the build doesn't use. Keep
      # the Android SDK/NDK and the hosted tool cache (Node lives there).
      - name: Free up disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc /usr/local/.ghcup || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/powershell /usr/share/miniconda || true
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          # Corepack (enabled below) manages Yarn 4; disable setup-node's auto
          # package-manager cache, which runs global Yarn 1 before Corepack is on.
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Yarn
        run: |
          corepack prepare yarn@${{ inputs.yarn-version }} --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup Gradle properties
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2048m" >> ~/.gradle/gradle.properties

      - name: Install Doppler CLI
        run: |
          curl -Ls https://cli.doppler.com/install.sh | sudo sh
          doppler --version

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Write Google Play service account key
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > eas-service-account.json

      - name: Build and Deploy to Google Play Store
        run: yarn deploy-store-android
        env:
          ENV: ${{ inputs.environment }}
          DOPPLER_TOKEN: ${{ inputs.environment == 'prd' && secrets.DOPPLER_TOKEN_PROD || secrets.DOPPLER_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
