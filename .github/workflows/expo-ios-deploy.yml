name: Expo iOS Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment (stg, prd)'
        required: true
        type: string
      node-version:
        required: true
        type: string
      yarn-version:
        required: false
        type: string
        default: '4.9.2'
      cocoapods-version:
        required: false
        type: string
        default: '1.16.2'
      macos-runner-image:
        required: false
        type: string
        default: 'macos-15'
      xcode-version:
        required: false
        type: string
        default: '26.0'
        description: 'Expo SDK 55 requires Xcode >= 26.0'

jobs:
  deploy:
    runs-on: ${{ inputs.macos-runner-image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          # Corepack (enabled below) manages Yarn 4; disable setup-node's auto
          # package-manager cache, which runs global Yarn 1 before Corepack is on.
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Yarn
        run: |
          corepack prepare yarn@${{ inputs.yarn-version }} --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Free-up Space
        run: |
          df -h
          {
            xcrun simctl delete all
            sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/*
            sudo rm -rf ~/Library/Developer/CoreSimulator/Devices/*
          } || {
            echo "Cleaning devices and cache failed. Continuing the execution"
          }
          {
            sudo rm -rf ~/Library/Developer/Xcode/DerivedData
            sudo rm -rf /Applications/Xcode_{14.3.1,15.0.1,15.1}.app
          } || {
            echo "Cleaning unused xcode version failed. Continuing the execution"
          }
          df -h

      - name: Xcode Select Version
        uses: mobiledevops/xcode-select-version-action@v1
        with:
          xcode-select-version: ${{ inputs.xcode-version }}

      - name: Set up ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install Fastlane
        run: brew install fastlane

      - name: Setup cocoapods
        run: gem install cocoapods -v ${{ inputs.cocoapods-version }}

      - name: Install Doppler CLI
        run: |
          curl -Ls https://cli.doppler.com/install.sh | sudo sh
          doppler --version

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install iOS platform
        run: sudo xcodebuild -downloadPlatform iOS

      - name: Build and Deploy to Apple App Store
        run: yarn deploy-store-ios
        env:
          ENV: ${{ inputs.environment }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Both `eas build` and `eas submit` authenticate to Apple via the App
          # Store Connect API Key stored on EAS, selected non-interactively (see
          # `--non-interactive` in the deploy-store-ios script). No Apple ID /
          # app-specific password.
          # Default 3s timeout is too short when new Swift Packages are being resolved.
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
