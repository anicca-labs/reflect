name: Build and Deploy to App Stores (stg)

on:
  push:
    branches:
      - stg
    paths:
      - 'package.json'
      - 'yarn.lock'
      - 'app.config.ts'
      - 'eas.json'
      - 'google-services-stg.json'
      - 'GoogleService-Info-stg.plist'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  detect-platform:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.detect.outputs.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            native:
              - 'yarn.lock'
              - 'app.config.ts'
              - 'eas.json'
            android:
              - 'google-services-stg.json'
            ios:
              - 'GoogleService-Info-stg.plist'
      # package.json changes for many reasons (scripts, devDeps) that don't need a
      # native rebuild — only treat it as build-worthy when the app `version` field
      # actually changes (a release). Dependency changes are covered by yarn.lock above.
      - id: version
        run: |
          BEFORE='${{ github.event.before }}'
          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          OLD=$(git show "$BEFORE:package.json" 2>/dev/null | python3 -c "import sys,json;print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
          NEW=$(python3 -c "import json;print(json.load(open('package.json')).get('version',''))")
          echo "old=$OLD new=$NEW"
          if [[ "$OLD" != "$NEW" ]]; then echo "changed=true" >> "$GITHUB_OUTPUT"; else echo "changed=false" >> "$GITHUB_OUTPUT"; fi
      - id: detect
        run: |
          if [[ "${{ steps.changes.outputs.native }}" == "true" || "${{ steps.version.outputs.changed }}" == "true" ]]; then
            echo "platform=all" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.changes.outputs.android }}" == "true" && "${{ steps.changes.outputs.ios }}" == "true" ]]; then
            echo "platform=all" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.changes.outputs.android }}" == "true" ]]; then
            echo "platform=android" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.changes.outputs.ios }}" == "true" ]]; then
            echo "platform=ios" >> "$GITHUB_OUTPUT"
          else
            echo "platform=none" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: [detect-platform]
    if: ${{ always() && !failure() && !cancelled() && (github.event_name == 'workflow_dispatch' || needs.detect-platform.outputs.platform != 'none') }}
    uses: ./.github/workflows/expo-store-deploy.yml
    secrets: inherit
    with:
      environment: stg
      platform: ${{ github.event_name == 'push' && needs.detect-platform.outputs.platform || inputs.platform }}
